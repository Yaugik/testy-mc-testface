services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: testy
      POSTGRES_USER: testy
      POSTGRES_PASSWORD: testy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testy -d testy"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - testy-postgres-data:/var/lib/postgresql/data

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CONTROL_PLANE_HOST: 0.0.0.0
      CONTROL_PLANE_PORT: 3000
      DATABASE_URL: postgresql://testy:testy@postgres:5432/testy
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/v1/readiness').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  testy-postgres-data:
