services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: testy
      POSTGRES_USER: testy
      POSTGRES_PASSWORD: testy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testy -d testy"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - testy-postgres-data:/var/lib/postgresql/data

  traffic-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["pnpm", "--filter", "@testy/traffic-gateway-app", "start"]
    environment:
      TESTY_GATEWAY_HOST: 0.0.0.0
      TESTY_GATEWAY_PORT: 3100
      TESTY_GATEWAY_ADMIN_TOKEN: ${TESTY_GATEWAY_ADMIN_TOKEN:-test-gateway-admin-token-local}
      TESTY_GATEWAY_ALLOWED_TARGET_ORIGINS: ${TESTY_GATEWAY_ALLOWED_TARGET_ORIGINS:-http://host.docker.internal:8080}
      TESTY_GATEWAY_BLOCKED_PROVIDER_HOSTS: ${TESTY_GATEWAY_BLOCKED_PROVIDER_HOSTS:-}
    ports:
      - "3100:3100"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3100/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CONTROL_PLANE_HOST: 0.0.0.0
      CONTROL_PLANE_PORT: 3000
      DATABASE_URL: postgresql://testy:testy@postgres:5432/testy
      LOG_LEVEL: info
      SCENARIOS_DIR: scenarios
      VENDOR_PACKAGES_DIR: vendors
      BROWSER_PACKAGES_DIR: customers
      GENERATED_RUNS_DIR: generated/runs
      TESTY_IMPOSTER_IMAGE: ${TESTY_IMPOSTER_IMAGE:-outofcoffee/imposter:5}
      TESTY_BROWSER: ${TESTY_BROWSER:-chromium}
      TESTY_HEADLESS: ${TESTY_HEADLESS:-true}
      TESTY_MAINTENANCE_INTERVAL_MS: ${TESTY_MAINTENANCE_INTERVAL_MS:-60000}
      TESTY_MAINTENANCE_BATCH_SIZE: ${TESTY_MAINTENANCE_BATCH_SIZE:-100}
      TESTY_MAINTENANCE_CLAIM_TTL_MS: ${TESTY_MAINTENANCE_CLAIM_TTL_MS:-300000}
      TESTY_ARTIFACT_RETENTION_MS: ${TESTY_ARTIFACT_RETENTION_MS:-604800000}
      TESTY_MAINTENANCE_ADMIN_TOKEN: ${TESTY_MAINTENANCE_ADMIN_TOKEN:-}
      TESTY_GATEWAY_ADMIN_URL: ${TESTY_GATEWAY_ADMIN_URL:-}
      TESTY_GATEWAY_ADMIN_TOKEN: ${TESTY_CONTROL_GATEWAY_ADMIN_TOKEN:-}
      GL_EYE_BASE_URL: ${GL_EYE_BASE_URL:-}
      GL_EYE_ENVIRONMENT: ${GL_EYE_ENVIRONMENT:-}
      GL_EYE_TEST_SUPPORT_TOKEN: ${GL_EYE_TEST_SUPPORT_TOKEN:-}
      GL_EYE_ALLOWED_ORIGINS: ${GL_EYE_ALLOWED_ORIGINS:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/v1/readiness').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  testy-postgres-data:
