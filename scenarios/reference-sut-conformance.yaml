schemaVersion: "1.0"
scenario:
  id: reference-sut-conformance
  displayName: Reference SUT complete black-box conformance slice

target: reference-sut
timeoutMs: 600000

variables:
  targetOrigin: http://reference-sut:8080
  syntheticIp: 198.51.100.25

assertions:
  - id: browser-journey-passed
    type: browser-journey-passed
    journeyId: lead-capture
  - id: duplicate-submit-passed
    type: browser-action
    journeyId: lead-capture
    action: submit
    expectedStatus: PASSED
    minimum: 2
  - id: tracking-script-delivered-twice
    type: observation-count
    observationType: browser-request-check
    status: delivered
    equals: 2
  - id: ipinfo-called-once
    type: provider-call-count
    vendorId: ipinfo
    equals: 1
  - id: apollo-called-once
    type: provider-call-count
    vendorId: apollo
    equals: 1
  - id: hunter-called-once
    type: provider-call-count
    vendorId: hunter
    equals: 1
  - id: provider-order
    type: provider-call-order
    exact: true
    sequence:
      - vendorId: ipinfo
      - vendorId: apollo
      - vendorId: hunter
  - id: target-created-one-score
    type: observation
    observationType: target-outcome
    path: scoreCount
    operator: equals
    expected: 1
  - id: target-created-one-company
    type: observation
    observationType: target-outcome
    path: companyCount
    operator: equals
    expected: 1
  - id: target-processed-one-event
    type: observation
    observationType: target-outcome
    path: processedEventCount
    operator: equals
    expected: 1
  - id: target-detected-duplicate
    type: observation
    observationType: target-outcome
    path: duplicateEventCount
    operator: equals
    expected: 1
  - id: target-provider-provenance
    type: observation
    observationType: target-outcome
    path: providerProvenance
    operator: contains
    expected: hunter
  - id: target-confidence-high
    type: observation
    observationType: target-outcome
    path: confidence
    operator: equals
    expected: high
  - id: primary-tenant-visible
    type: observation
    observationType: target-outcome
    path: primaryTenantVisible
    operator: equals
    expected: true
  - id: control-tenant-hidden
    type: observation
    observationType: target-outcome
    path: controlTenantVisible
    operator: equals
    expected: false
  - id: form-submitted-twice
    type: observation
    observationType: synthetic-site-events
    path: counts.form-submit
    operator: equals
    expected: 2
  - id: browser-reports-present
    type: artifact-present
    kind: browser-report
    minimum: 2
  - id: no-unexpected-external-calls
    type: no-unexpected-external-calls

phases:
  allocate:
    - id: create-gateway-route
      kind: task
      action: gateway.create-route
      input:
        targetOrigin: "{{targetOrigin}}"
        syntheticIp: "{{syntheticIp}}"
        ttlMs: 900000
    - id: prepare-target
      kind: task
      action: target.prepare-run

  compile:
    - id: compile-vendors
      kind: parallel
      steps:
        - id: ipinfo
          kind: task
          action: vendor.compile
          input:
            package: ipinfo
        - id: apollo
          kind: task
          action: vendor.compile
          input:
            package: apollo
        - id: hunter
          kind: task
          action: vendor.compile
          input:
            package: hunter
    - id: load-customer-alpha
      kind: task
      action: browser.load-package
      input:
        package: customer-alpha

  configure:
    - id: start-vendor-runtimes
      kind: parallel
      steps:
        - id: ipinfo
          kind: task
          action: vendor.start-runtime
          input:
            vendorId: ipinfo
        - id: apollo
          kind: task
          action: vendor.start-runtime
          input:
            vendorId: apollo
        - id: hunter
          kind: task
          action: vendor.start-runtime
          input:
            vendorId: hunter
    - id: start-site
      kind: task
      action: site.start
    - id: configure-target-vendors
      kind: task
      action: platform.configure-target-vendors
    - id: configure-target-site
      kind: task
      action: platform.configure-target-site
    - id: start-target-observation
      kind: task
      action: target.start-observation

  run:
    - id: run-lead-capture-initial
      kind: task
      action: browser.run-journey
      input:
        journeyId: lead-capture
        executionId: initial
        targetPreparationStepId: prepare-target
    - id: run-lead-capture-duplicate
      kind: task
      action: browser.run-journey
      input:
        journeyId: lead-capture
        executionId: duplicate
        targetPreparationStepId: prepare-target

  observe:
    - id: wait-for-target
      kind: task
      action: target.wait-for-completion
      input:
        timeoutMs: 120000
        pollIntervalMs: 1000
        expectedState: completed
    - id: collect-local-evidence
      kind: parallel
      steps:
        - id: site-events
          kind: task
          action: browser.collect-site-events
        - id: ipinfo-ledger
          kind: task
          action: vendor.collect-ledger
          input:
            vendorId: ipinfo
        - id: apollo-ledger
          kind: task
          action: vendor.collect-ledger
          input:
            vendorId: apollo
        - id: hunter-ledger
          kind: task
          action: vendor.collect-ledger
          input:
            vendorId: hunter
    - id: collect-target-outcome
      kind: task
      action: target.collect-outcome
    - id: collect-gateway-ledger
      kind: task
      action: gateway.collect-ledger
