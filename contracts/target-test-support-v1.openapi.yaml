openapi: 3.1.0
info:
  title: Testy Target Test-Support API
  version: 1.0.0
  description: >-
    Authenticated, test-environment-only contract implemented by systems under test.
    Raw credentials, contact payloads and production data must never be returned.
servers:
  - url: http://reference-sut:8080
security:
  - serviceBearer: []
paths:
  /test-support/v1/capabilities:
    get:
      operationId: getCapabilities
      responses:
        '200':
          description: Supported contract features.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Capabilities'
  /test-support/v1/runs:
    post:
      operationId: prepareRun
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrepareRunRequest'
      responses:
        '201':
          description: Prepared target run.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreparedRun'
        '409':
          $ref: '#/components/responses/Conflict'
  /test-support/v1/runs/{targetRunId}/vendor-endpoints:
    put:
      operationId: configureVendorEndpoints
      parameters:
        - $ref: '#/components/parameters/TargetRunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [endpoints]
              properties:
                endpoints:
                  type: object
                  required: [ipinfo, apollo, hunter]
                  additionalProperties: false
                  properties:
                    ipinfo: { type: string, format: uri }
                    apollo: { type: string, format: uri }
                    hunter: { type: string, format: uri }
      responses:
        '204': { description: Configured. }
        '404': { $ref: '#/components/responses/NotFound' }
  /test-support/v1/runs/{targetRunId}/site:
    put:
      operationId: configureSite
      parameters:
        - $ref: '#/components/parameters/TargetRunId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteBinding'
      responses:
        '204': { description: Configured. }
        '404': { $ref: '#/components/responses/NotFound' }
  /test-support/v1/runs/{targetRunId}/observations:
    post:
      operationId: startObservation
      parameters:
        - $ref: '#/components/parameters/TargetRunId'
      responses:
        '201':
          description: Observation handle.
          content:
            application/json:
              schema:
                type: object
                required: [observationId]
                properties:
                  observationId: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
  /test-support/v1/runs/{targetRunId}/observations/{observationId}:
    get:
      operationId: getObservation
      parameters:
        - $ref: '#/components/parameters/TargetRunId'
        - name: observationId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Current processing state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObservationStatus'
        '404': { $ref: '#/components/responses/NotFound' }
  /test-support/v1/runs/{targetRunId}/outcome:
    get:
      operationId: collectOutcome
      parameters:
        - $ref: '#/components/parameters/TargetRunId'
      responses:
        '200':
          description: Sanitized black-box outcome.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TargetOutcome'
        '404': { $ref: '#/components/responses/NotFound' }
  /test-support/v1/runs/{targetRunId}:
    delete:
      operationId: cleanupRun
      parameters:
        - $ref: '#/components/parameters/TargetRunId'
      responses:
        '204': { description: Removed or already absent. }
  /test-support/v1/traffic/events:
    post:
      operationId: ingestTrackingEvent
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema: { type: string, minLength: 32 }
        - name: Idempotency-Key
          in: header
          required: false
          schema: { type: string, minLength: 1, maxLength: 200 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Accepted once; duplicate keys return the same processing identity.
          content:
            application/json:
              schema:
                type: object
                required: [eventId, duplicate]
                properties:
                  eventId: { type: string }
                  duplicate: { type: boolean }
        '401': { $ref: '#/components/responses/Unauthorized' }
components:
  securitySchemes:
    serviceBearer:
      type: http
      scheme: bearer
  parameters:
    TargetRunId:
      name: targetRunId
      in: path
      required: true
      schema: { type: string }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema: { type: string, minLength: 1, maxLength: 200 }
  responses:
    Unauthorized:
      description: Authentication failed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Target run was not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: Idempotency key conflicts with another request.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }
    Capabilities:
      type: object
      required: [contractVersion, target, features]
      properties:
        contractVersion: { const: '1.0' }
        target: { type: string }
        features:
          type: object
          required: [tenantIsolation, idempotency, mutations, directTraffic]
          properties:
            tenantIsolation: { type: boolean }
            idempotency: { type: boolean }
            mutations: { type: boolean }
            directTraffic: { type: boolean }
    PrepareRunRequest:
      type: object
      additionalProperties: false
      required: [runId, scenarioId, target, environment]
      properties:
        runId: { type: string, format: uuid }
        scenarioId: { type: string }
        target: { type: string }
        environment: { type: string, enum: [local, test, testing, qa] }
        mutations:
          type: object
          additionalProperties: false
          properties:
            leakControlTenant: { type: boolean, default: false }
            duplicateScore: { type: boolean, default: false }
            skipHunter: { type: boolean, default: false }
            unexpectedEgress: { type: boolean, default: false }
    PreparedRun:
      type: object
      required: [targetRunId, tenantId, controlTenantId, trackingScriptUrl, siteId, targetOrigin, ingestionToken]
      properties:
        targetRunId: { type: string }
        tenantId: { type: string }
        controlTenantId: { type: string }
        trackingScriptUrl: { type: string, format: uri }
        siteId: { type: string }
        targetOrigin: { type: string, format: uri }
        ingestionToken: { type: string, minLength: 32, writeOnly: true }
    SiteBinding:
      type: object
      additionalProperties: false
      required: [siteId, hostname]
      properties:
        siteId: { type: string }
        hostname: { type: string }
        metadata:
          type: object
          additionalProperties: { type: string }
    ObservationStatus:
      type: object
      required: [state, completed, eventCount]
      properties:
        state: { type: string, enum: [waiting, processing, completed, failed] }
        completed: { type: boolean }
        eventCount: { type: integer, minimum: 0 }
        failureCode: { type: string }
    TargetOutcome:
      type: object
      required: [targetRunId, tenantId, visibleTenantIds, companyCount, scoreCount, processedEventCount, duplicateEventCount, companyFingerprint, scoreFingerprints, providerProvenance, confidence, suppressionStatus]
      properties:
        targetRunId: { type: string }
        tenantId: { type: string }
        visibleTenantIds:
          type: array
          items: { type: string }
        companyCount: { type: integer, minimum: 0 }
        scoreCount: { type: integer, minimum: 0 }
        processedEventCount: { type: integer, minimum: 0 }
        duplicateEventCount: { type: integer, minimum: 0 }
        companyFingerprint: { type: string, pattern: '^[a-f0-9]{64}$' }
        scoreFingerprints:
          type: array
          items: { type: string, pattern: '^[a-f0-9]{64}$' }
        providerProvenance:
          type: array
          items: { type: string, enum: [ipinfo, apollo, hunter] }
        confidence: { type: string, enum: [low, medium, high] }
        suppressionStatus: { type: string, enum: [allowed, suppressed] }
        processingWarnings:
          type: array
          items: { type: string }
