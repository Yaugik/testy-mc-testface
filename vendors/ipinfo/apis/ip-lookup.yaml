schemaVersion: "1.0"
operationId: lookup-ip
request:
  method: GET
  path: /{ip}

cases:
  - id: corporate-high-confidence
    priority: 100
    when:
      path.ip: "198.51.100.10"
    respond:
      status: 200
      body: responses/corporate.json

  - id: residential
    priority: 100
    when:
      path.ip: "198.51.100.20"
    respond:
      status: 200
      body: responses/residential.json

  - id: unknown
    priority: 100
    when:
      path.ip: "198.51.100.30"
    respond:
      status: 200
      body: responses/unknown.json

  - id: timeout
    priority: 100
    when:
      path.ip: "198.51.100.60"
    transport:
      type: timeout
      duration: 5s

  - id: transient-recovery
    priority: 100
    when:
      path.ip: "198.51.100.61"
    effects:
      stores:
        - store: recovery
          key: attempts
          operation: increment
    sequence:
      onExhausted: repeat-last
      steps:
        - transport:
            type: timeout
            duration: 2s
          effects:
            stores:
              - store: recovery
                key: last-outcome
                operation: set
                value: timeout
        - respond:
            status: 503
            body: responses/unavailable.json
          effects:
            stores:
              - store: recovery
                key: last-outcome
                operation: set
                value: unavailable
        - respond:
            status: 200
            body: responses/corporate.json
          effects:
            stores:
              - store: recovery
                key: last-outcome
                operation: set
                value: recovered

  - id: enter-unavailable
    priority: 100
    when:
      path.ip: "198.51.100.70"
    respond:
      status: 503
      body: responses/unavailable.json
    effects:
      setState: unavailable
      stores:
        - store: scenario
          key: last-trigger
          operation: set
          value: enter-unavailable
