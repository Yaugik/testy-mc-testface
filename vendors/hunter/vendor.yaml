schemaVersion: "1.0"
vendor:
  id: hunter
  displayName: Synthetic Hunter
  contractVersion: "2026-07"
server:
  basePath: /hunter
  defaultContentType: application/json
authentication:
  strategies:
    - id: api-key
      type: api-key
      source: query
      name: api_key
      validValues:
        - test-hunter-key
      onFailure:
        status: 401
        body: responses/unauthorized.json
routing:
  unmatchedRequest:
    status: 404
    body: responses/not-found.json
privacy:
  capture:
    allow:
      - method
      - path
      - queryKeys
      - selectedHeaders
      - bodyFingerprint
      - timing
    redactHeaders:
      - Authorization
      - Cookie
